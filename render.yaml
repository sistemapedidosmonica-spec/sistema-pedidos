services:
  - type: web
    name: sistema-pedidos-monica
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pedidos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: pedidos-db
    plan: free
    region: oregon
